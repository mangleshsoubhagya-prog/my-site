<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

button{
background:#ddf59d;
color:#0509f3;
border:none;
padding:10px 15px;
border-radius:25px;
cursor:pointer;
font-weight:bold;
margin:3px;
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
padding:15px;
margin:10px;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.day{
padding:12px;
text-align:center;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.day:hover{
transform:scale(1.05);
}

.today{
border:3px solid yellow;
}

.p{
background:#3ce608;
color:black;
}

.a{
background:#ff4b2b;
}

.sunday{
background:rgb(224, 16, 243) !important;
color:black !important;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-box{
background:#111;
padding:20px;
border-radius:15px;
width:90%;
max-width:500px;
max-height:90vh;
overflow:auto;
}

input{
width:100%;
padding:12px;
margin:5px 0;
border-radius:10px;
border:none;
outline:none;
}

.user-card{
background:rgba(255,255,255,0.08);
padding:12px;
margin:10px 0;
border-radius:15px;
}

.map-btn{
background:#00c853;
color:white;
margin-top:10px;
}

.delete-btn{
background:red;
color:white;
margin-top:10px;
}

.live-btn{
background:#ff9800;
color:white;
}

.online{
background:#00e676;
color:black;
padding:5px 10px;
border-radius:20px;
display:inline-block;
font-size:12px;
font-weight:bold;
}

.salary-box{
background:#0f172a;
padding:12px;
border-radius:12px;
line-height:2;
margin-top:10px;
}

@media(max-width:700px){

.calendar-grid{
grid-template-columns:repeat(4,1fr);
}

.navbar{
flex-direction:column;
gap:10px;
}

}

</style>

</head>

<body>
<div class="navbar">

<h2>Bhavy Softech Solution</h2>

<div style="display:flex;align-items:center;gap:8px;">

<button onclick="goDashboard()">
🏠 Dashboard
</button>

<span id="userName"></span>

<button onclick="logout()">
Logout
</button>

</div>

</div>

<div class="glass">

<button onclick="openAttendance()">
📍 Punch In
</button>

<button onclick="punchOut()">
🛑 Punch Out
</button>

<button onclick="openDownload()">
📥 Download
</button>

<button
id="liveTrackingBtn"
onclick="showLiveUsers()"
style="display:none;background:#ff9800;color:white;">

📡 Live Tracking

</button>

</div>

<div class="glass">

<h3>

<button onclick="prevMonth()">⬅</button>

<span id="monthLabel"></span>

<button onclick="nextMonth()">➡</button>

</h3>

<div id="calendarGrid" class="calendar-grid"></div>

<h3>👷 Engineers</h3>

<div id="engineerList">
Click any date...
</div>

</div>
<div class="glass"></div>
<div class="glass">
    <h3>📡 Live Tracking Map</h3>
    <div id="map" style="height:400px;border-radius:15px;"></div>
</div>

<!-- ATTENDANCE -->

<div id="attendanceModal" class="modal">

<div class="modal-box">

<h3>📍 Punch In</h3>

<input id="manualPlace" placeholder="Enter Place">

<input id="autoLocation" readonly>

<button onclick="submitAttendance()">
Submit
</button>

<button onclick="closeAttendance()">
Close
</button>

</div>

</div>

<!-- DOWNLOAD -->

<div id="downloadModal" class="modal">

<div class="modal-box">

<h3>📥 Download CSV</h3>

<input type="date" id="fromDate">

<input type="date" id="toDate">

<button onclick="downloadCSV()">
Download
</button>

<button onclick="closeDownload()">
Close
</button>

</div>

</div>

<!-- LIVE -->

<div id="liveModal" class="modal">

<div class="modal-box">

<h3>📡 Live Users</h3>

<div id="liveUsersList">
Loading...
</div>

<button onclick="closeLiveModal()">
Close
</button>

</div>

</div>

<script>

function goDashboard(){

if(window.parent && window.parent.showPage){
    window.parent.showPage('dashboard');
}

}

// FIREBASE

const firebaseConfig = {

apiKey: "AIzaSyAbjZrPfGx0UTBAW4HndPxf9mMhhmg513s",
authDomain: "attendance-system-fc71c.firebaseapp.com",
projectId: "attendance-system-fc71c",
storageBucket: "attendance-system-fc71c.appspot.com",
appId: "1:57089003187:web:dc8864aa56701384d6aac6"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// USER

let user =
localStorage.getItem("user") || "Guest";

let role =
localStorage.getItem("role") || "user";

document.getElementById("userName").innerText =
user + " (" + role + ")";

if(role === "admin"){

document.getElementById("liveTrackingBtn").style.display =
"inline-block";

}

// SALARY

let monthlySalaryMap = {

"Manglesh":25000,
"Nityanand":13000,
"Arvind":13000,
"Alok":15000,
"Rajan":13000

};

let allData = [];
let currentDate = new Date();
let trackingInterval = null;
let map;
let markers = {};
// DATE

function getDate(d){

let x = new Date(d);

return x.getFullYear() + "-" +
String(x.getMonth()+1).padStart(2,'0') + "-" +
String(x.getDate()).padStart(2,'0');

}

// MONTH RANGE

function getMonthRange(){

let base = new Date(currentDate);

let start =
base.getDate() >= 26
?
new Date(base.getFullYear(),base.getMonth(),26)
:
new Date(base.getFullYear(),base.getMonth()-1,26);

let end =
new Date(start.getFullYear(),start.getMonth()+1,25);

return {start,end};

}

// SALARY DATA

function getSalaryMonthData(name){

let {start,end} = getMonthRange();

let startDate = getDate(start);
let endDate = getDate(end);

// USER DATA

let userData = allData.filter(x =>

x.name === name &&
x.date >= startDate &&
x.date <= endDate

);

// UNIQUE DATES

let uniqueDates = [];

userData.forEach(x=>{

if(!uniqueDates.includes(x.date)){

uniqueDates.push(x.date);

}

});

uniqueDates.sort();

// NO DATA

if(uniqueDates.length === 0){

return {

attendance:0,
monthlySalary:0,
perDay:0,
earned:0,
range:`${startDate} → ${endDate}`,
workingSunday:0,
sundayCount:0,
absent:0,
totalDays:0

};

}

// COUNTS

let attendance = 0;
let workingSunday = 0;
let sundayCount = 0;
let absent = 0;

// NORMAL MARK COUNT

attendance = uniqueDates.length;

// DATE LOOP

let joiningDate =
new Date(uniqueDates[0] + "T00:00:00");

let current =
new Date();

current.setHours(0,0,0,0);

let tempDate =
new Date(joiningDate);

while(tempDate <= current){

let isSunday =
tempDate.getDay() === 0;

if(isSunday){

sundayCount++;

let sunday =
getDate(tempDate);

let saturdayDate =
new Date(tempDate);

saturdayDate.setDate(
saturdayDate.getDate()-1
);

let mondayDate =
new Date(tempDate);

mondayDate.setDate(
mondayDate.getDate()+1
);

let saturday =
getDate(saturdayDate);

let monday =
getDate(mondayDate);

// CHECK MARKS

let satMarked =
uniqueDates.includes(saturday);

let sunMarked =
uniqueDates.includes(sunday);

let monMarked =
uniqueDates.includes(monday);

// =====================
// SUNDAY NO MARK
// SAT + MON REQUIRED
// =====================

if(!sunMarked && satMarked && monMarked){

attendance++;

}

// =====================
// SUNDAY MARK
// EXTRA COUNT
// =====================

if(sunMarked){

workingSunday++;

attendance++;

}

}

tempDate.setDate(
tempDate.getDate()+1
);

}

// ABSENT

let totalNormalDays = 0;

tempDate =
new Date(joiningDate);

while(tempDate <= current){

if(tempDate.getDay() !== 0){

totalNormalDays++;

}

tempDate.setDate(
tempDate.getDate()+1
);

}

absent =
totalNormalDays -
(uniqueDates.filter(x=>{

let d =
new Date(x + "T00:00:00");

return d.getDay() !== 0;

}).length);

if(absent < 0){

absent = 0;

}

// TOTAL DAYS

let totalDays =
Math.floor(
(end - start)
/ (1000*60*60*24)
) + 1;

// SALARY

let monthlySalary =
monthlySalaryMap[name] || 13000;

let perDay =
monthlySalary / totalDays;

let earned =
attendance * perDay;

// RETURN

return {

attendance,

monthlySalary:
monthlySalary.toFixed(0),

perDay:
perDay.toFixed(0),

earned:
earned.toFixed(0),

range:
`${startDate} → ${endDate}`,

workingSunday,

sundayCount,

absent,

totalDays

};

}
// MODALS

function openAttendance(){

attendanceModal.style.display = "flex";

navigator.geolocation.getCurrentPosition(

p=>{

autoLocation.value =
p.coords.latitude + "," + p.coords.longitude;

}

);

}

function closeAttendance(){

attendanceModal.style.display = "none";

}

function openDownload(){

downloadModal.style.display = "flex";

}

function closeDownload(){

downloadModal.style.display = "none";

}

function closeLiveModal(){

liveModal.style.display = "none";

}

// ATTENDANCE

async function submitAttendance(){

let today =
getDate(new Date());

let docId =
user + "_" + today;

let check =
await db.collection("attendance")
.doc(docId)
.get();

if(check.exists){

alert("Already Marked");

return;

}

navigator.geolocation.getCurrentPosition(

async p=>{

await db.collection("attendance")
.doc(docId)
.set({

name:user,
date:today,
place:manualPlace.value,
lat:p.coords.latitude,
lon:p.coords.longitude,
timestamp:new Date()

});

alert("Attendance Marked");

closeAttendance();

loadData();

startLiveTracking();

}

);

}

// LIVE TRACKING

let routeBuffer = [];

function startLiveTracking() {

    let docId = user + "_" + getDate(new Date());

    trackingInterval = setInterval(() => {

        navigator.geolocation.getCurrentPosition(async p => {

            routeBuffer.push({
                lat: p.coords.latitude,
                lng: p.coords.longitude,
                time: Date.now()
            });

            // 🔥 every 30 sec upload once
            if (routeBuffer.length >= 6) {

                let ref = db.collection("liveRoutes").doc(docId);

                await ref.set({
                    name: user,
                    date: getDate(new Date()),
                    active: true,
                    points: firebase.firestore.FieldValue.arrayUnion(...routeBuffer)
                }, { merge: true });

                routeBuffer = [];
            }

        });

    }, 5000);
}
// PUNCH OUT

async function punchOut(){

if(trackingInterval){

clearInterval(trackingInterval);

}

await db.collection("liveTracking")
.doc(user)
.delete();

alert("Punch Out Success");

}

// LIVE USERS

async function showLiveUsers(){

if(role !== "admin") return;

liveModal.style.display = "flex";

let snap =
await db.collection("liveTracking").get();

let html = "";

snap.forEach(doc=>{

let x = doc.data();

html += `

<div class="user-card">

<h3>${x.name}</h3>

<div class="online">
ONLINE
</div>

<br><br>

<button
class="live-btn"
onclick="openMap('${x.lat}','${x.lon}')">

📡 Live Location

</button>

</div>

`;

});

liveUsersList.innerHTML =
html || "No Live Users";

}

// LOAD DATA

async function loadData(){

    let snap =
    await db.collection("attendance").get();

    allData =
    snap.docs.map(d=>({

        id:d.id,
        ...d.data()

    }));

    renderCalendar();

}   // 👈 YAHAN FUNCTION END

// 🔥 YAHAN PASTE KARO
function initMap(){

    if(map){
        map.remove();
    }

    map = L.map('map').setView([22.8046, 86.2029], 12);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'Live Tracking'
    }).addTo(map);

}
function loadLiveMap(){

    db.collection("liveTracking").onSnapshot(snapshot => {

        // old markers clear
        Object.values(markers).forEach(m => map.removeLayer(m));
        markers = {};

        snapshot.forEach(doc => {

            let data = doc.data();

            let marker = L.marker([data.lat, data.lon])
                .addTo(map)
                .bindPopup(data.name);

            markers[data.name] = marker;
        });

    });
}
// ===============================
// CALENDAR
// ===============================

function renderCalendar(){

calendarGrid.innerHTML = "";

let {start,end} =
getMonthRange();

monthLabel.innerText =
getDate(start) + " → " + getDate(end);

let temp = new Date(start);

while(temp <= end){

let full = getDate(temp);

// USER ATTENDANCE CHECK

let found =
role==="admin"
?
allData.some(x=>x.date===full)
:
allData.some(
x=>x.date===full &&
x.name===user
);

// TODAY

let today =
getDate(new Date())===full;

// SUNDAY CHECK

let isSunday =
temp.getDay() === 0;

// ==========================
// COLOR LOGIC
// ==========================

let className = "day";

// TODAY BORDER

if(today){

className += " today";

}

// ==========================
// SUNDAY LOGIC
// ==========================

// Sunday + Attendance = GREEN

if(isSunday && found){

className += " p";

// Sunday + No Attendance = YELLOW

}else if(isSunday && !found){

className += " sunday";

// Normal Present = GREEN

}else if(found){

className += " p";

// Normal Absent = RED

}else{

className += " a";

}

// ==========================

calendarGrid.innerHTML += `

<div
class="${className}"
onclick="showDay('${full}')"
>

${temp.getDate()}

<br>

<small>
${temp.toLocaleDateString(
'en-IN',
{weekday:'short'}
)}
</small>

</div>

`;

temp.setDate(
temp.getDate()+1
);

}

}

// SHOW DAY

function showDay(date){

let list =
role==="admin"
?
allData.filter(x=>x.date===date)
:
allData.filter(
x=>x.date===date &&
x.name===user
);

if(list.length===0){

engineerList.innerHTML =
"No Attendance";

return;

}

let users = {};

list.forEach(x=>{

users[x.name] = x;

});

let unique =
Object.values(users);

engineerList.innerHTML =
unique.map(x=>{

let s =
getSalaryMonthData(x.name);

return `

<div class="user-card">

<h3>👷 ${x.name}</h3>

<div>
📍 ${x.place || "No Place"}
</div>

<div class="salary-box">

📅 Salary Month :
<b>${s.range}</b>

<br>

✅ Attendance :
<b>${s.attendance} Days</b>

<br>

🟨 Sundays :
<b style="color:Orange;">
${s.workingSunday}/${s.sundayCount}
</b>

<br>

❌ Absent :
<b style="color:red;">
${s.absent} Days
</b>

<br>

💵 Monthly Salary :
<b>₹${s.monthlySalary}</b>

<br>

📆 Per Day Salary :
<b>₹${s.perDay}</b>

<br>

🏦 Earned Salary :
<b style="color:#00ff95;">
₹${s.earned}
</b>

</div>

<br>

<button
class="map-btn"
onclick="openMap('${x.lat}','${x.lon}')">

🗺 Attendance Location

</button>

${
role==="admin"
?
`
<button
class="delete-btn"
onclick="deleteAttendance('${x.id}')">

🗑 Delete

</button>
`
:
""
}

</div>

`;

}).join("");

}

// DELETE

async function deleteAttendance(id){

    if(role!=="admin") return;

    let ok = confirm("Delete Attendance ?");

    if(!ok) return;

    await db.collection("attendance").doc(id).delete();

    alert("Deleted");

    loadData();
}
// MAP
function openMap(lat, lon){

    let url = `https://www.google.com/maps?q=${lat},${lon}`;

    if(window.Android && typeof window.Android.openExternal === "function"){
        window.Android.openExternal(url);
    } else {
        window.open(url, "_blank");
    }
}

// MONTH

function prevMonth(){

currentDate.setMonth(
currentDate.getMonth()-1
);

renderCalendar();

}

function nextMonth(){

currentDate.setMonth(
currentDate.getMonth()+1
);

renderCalendar();

}

// CSV

function downloadCSV(){

let from = fromDate.value;
let to = toDate.value;

if(!from || !to){

alert("Select Date");

return;

}

let filtered =
allData.filter(
x=>x.date>=from &&
x.date<=to
);

let csv =
"Name,Date,Place,Latitude,Longitude\n";

filtered.forEach(x=>{

csv +=
`${x.name},${x.date},${x.place},${x.lat},${x.lon}\n`;

});

let blob =
new Blob([csv]);

let a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"attendance.csv";

a.click();

}

// LOGOUT

function logout(){

localStorage.clear();

window.location.href =
"login.html";

}

window.onload = function () {
    loadData();

    setTimeout(() => {
        initMap();
        loadLiveMap();
    }, 500);
};

</script>

</body>
</html>
