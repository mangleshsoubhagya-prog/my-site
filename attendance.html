<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

button{
background:#ddf59d;
color:#0509f3;
border:none;
padding:10px 15px;
border-radius:25px;
cursor:pointer;
font-weight:bold;
margin:3px;
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
padding:15px;
margin:10px;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.day{
padding:12px;
text-align:center;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.day:hover{
transform:scale(1.05);
}

.today{
border:3px solid yellow;
}

.p{
background:#08e613;
color:black;
}

.a{
background:#ff4b2b;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-box{
background:#111;
padding:20px;
border-radius:15px;
width:90%;
max-width:500px;
max-height:90vh;
overflow:auto;
}

input{
width:100%;
padding:12px;
margin:5px 0;
border-radius:10px;
border:none;
outline:none;
}

.user-card{
background:rgba(255,255,255,0.08);
padding:12px;
margin:10px 0;
border-radius:15px;
}

.map-btn{
background:#00c853;
color:white;
margin-top:10px;
}

.delete-btn{
background:red;
color:white;
margin-top:10px;
}

.live-btn{
background:#ff9800;
color:white;
}

.online{
background:#00e676;
color:black;
padding:5px 10px;
border-radius:20px;
display:inline-block;
font-size:12px;
font-weight:bold;
}

.salary-box{
background:#0f172a;
padding:12px;
border-radius:12px;
line-height:2;
margin-top:10px;
}

@media(max-width:700px){

.calendar-grid{
grid-template-columns:repeat(4,1fr);
}

.navbar{
flex-direction:column;
gap:10px;
}

}

</style>

</head>

<body>

<div class="navbar">

<h2>Bhavy Softech Solution</h2>

<div>

<span id="userName"></span>

<button onclick="goDashboard()">
🏠 Dashboard
</button>

<button onclick="logout()">
Logout
</button>

</div>

</div>

<div class="glass">

<button onclick="openAttendance()">
📍 Punch In
</button>

<button onclick="punchOut()">
🛑 Punch Out
</button>

<button onclick="openDownload()">
📥 Download
</button>

<button
id="liveTrackingBtn"
onclick="showLiveUsers()"
style="display:none;background:#ff9800;color:white;">
📡 Live Tracking
</button>

</div>

<div class="glass">

<h3>

<button onclick="prevMonth()">⬅</button>

<span id="monthLabel"></span>

<button onclick="nextMonth()">➡</button>

</h3>

<div id="calendarGrid" class="calendar-grid"></div>

<h3>👷 Engineers</h3>

<div id="engineerList">
Click any date...
</div>

</div>

<!-- ATTENDANCE MODAL -->

<div id="attendanceModal" class="modal">

<div class="modal-box">

<h3>📍 Punch In</h3>

<input id="manualPlace" placeholder="Enter Place">

<input id="autoLocation" readonly>

<button onclick="submitAttendance()">
Submit
</button>

<button onclick="closeAttendance()">
Close
</button>

</div>

</div>

<!-- DOWNLOAD MODAL -->

<div id="downloadModal" class="modal">

<div class="modal-box">

<h3>📥 Download CSV</h3>

<input type="date" id="fromDate">

<input type="date" id="toDate">

<button onclick="downloadCSV()">
Download
</button>

<button onclick="closeDownload()">
Close
</button>

</div>

</div>

<!-- LIVE MODAL -->

<div id="liveModal" class="modal">

<div class="modal-box">

<h3>📡 Live Users</h3>

<div id="liveUsersList">
Loading...
</div>

<button onclick="closeLiveModal()">
Close
</button>

</div>

</div>

<!-- PLAYBACK MODAL -->

<div id="playbackModal" class="modal">

<div class="modal-box" style="max-width:900px;">

<h3>🛣 Playback Route</h3>

<div
id="playbackMap"
style="
height:500px;
border-radius:15px;
margin-top:10px;
">
</div>

<br>

<button onclick="closePlayback()">
Close
</button>

</div>

</div>

<script>

// ===============================
// FIREBASE
// ===============================

const firebaseConfig = {

apiKey: "AIzaSyAbjZrPfGx0UTBAW4HndPxf9mMhhmg513s",
authDomain: "attendance-system-fc71c.firebaseapp.com",
projectId: "attendance-system-fc71c",
storageBucket: "attendance-system-fc71c.appspot.com",
appId: "1:57089003187:web:dc8864aa56701384d6aac6"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

// ===============================
// USER
// ===============================

let user =
localStorage.getItem("user") || "Guest";

let role =
localStorage.getItem("role") || "user";

document.getElementById("userName").innerText =
user + " (" + role + ")";

if(role === "admin"){

document.getElementById("liveTrackingBtn").style.display =
"inline-block";

}

// ===============================
// SALARY
// ===============================

let monthlySalaryMap = {

"Manglesh":20000,
"Nityanand":13000,
"Arvind":13000,
"Alok":15000,
"Rajan":13000

};

// ===============================

let allData = [];
let currentDate = new Date();
let trackingInterval = null;
let selectedDate = "";

// ===============================
// DATE
// ===============================

function getDate(d){

let x = new Date(d);

return x.getFullYear() + "-" +
String(x.getMonth()+1).padStart(2,'0') + "-" +
String(x.getDate()).padStart(2,'0');

}

// ===============================
// MONTH RANGE
// ===============================

function getMonthRange(){

let base = new Date(currentDate);

let start =
base.getDate() >= 26
?
new Date(base.getFullYear(),base.getMonth(),26)
:
new Date(base.getFullYear(),base.getMonth()-1,26);

let end =
new Date(start.getFullYear(),start.getMonth()+1,25);

return {start,end};

}

// ===============================
// SALARY DATA
// ===============================

function getSalaryMonthData(name){

let {start,end} = getMonthRange();

let startDate = getDate(start);
let endDate = getDate(end);

// ======================
// UNIQUE ATTENDANCE
// ======================

let uniqueDates = [];

// LOOP ALL DATA

allData.forEach(x=>{

if(
x.name === name &&
x.date >= startDate &&
x.date <= endDate
){

// DUPLICATE REMOVE

if(!uniqueDates.includes(x.date)){

uniqueDates.push(x.date);

}

}

});

// FINAL ATTENDANCE COUNT

let attendance = uniqueDates.length;

// ======================
// TOTAL DAYS
// ======================

let totalDays = 30;

// ======================
// MONTHLY SALARY
// ======================

let monthlySalary =
monthlySalaryMap[name] || 13000;

// ======================
// PER DAY SALARY
// ======================

let perDay =
monthlySalary / totalDays;

// ======================
// EARNED SALARY
// ======================

let earned =
attendance * perDay;

// ======================

return {

attendance,

monthlySalary:
monthlySalary.toFixed(0),

perDay:
perDay.toFixed(0),

earned:
earned.toFixed(0),

range:
`${startDate} → ${endDate}`

};

}

// ===============================
// MODAL
// ===============================

function openAttendance(){

attendanceModal.style.display = "flex";

navigator.geolocation.getCurrentPosition(

p=>{

autoLocation.value =
p.coords.latitude + "," + p.coords.longitude;

}

);

}

function closeAttendance(){

attendanceModal.style.display = "none";

}

function openDownload(){

downloadModal.style.display = "flex";

}

function closeDownload(){

downloadModal.style.display = "none";

}

function closeLiveModal(){

liveModal.style.display = "none";

}

function closePlayback(){

playbackModal.style.display = "none";

}

// ===============================
// ATTENDANCE
// ===============================

async function submitAttendance(){

let today = getDate(new Date());

let docId = user + "_" + today;

let check =
await db.collection("attendance")
.doc(docId)
.get();

if(check.exists){

alert("Already Marked");

return;

}

navigator.geolocation.getCurrentPosition(

async p=>{

await db.collection("attendance")
.doc(docId)
.set({

name:user,
date:today,
place:manualPlace.value,
lat:p.coords.latitude,
lon:p.coords.longitude,
timestamp:new Date()

});

alert("Attendance Marked");

closeAttendance();

loadData();

startLiveTracking();

}

);

}

// ===============================
// LIVE TRACKING
// ===============================

function startLiveTracking(){

if(trackingInterval){

clearInterval(trackingInterval);

}

trackingInterval = setInterval(()=>{

navigator.geolocation.getCurrentPosition(

async p=>{

await db.collection("liveTracking")
.doc(user)
.set({

name:user,
lat:p.coords.latitude,
lon:p.coords.longitude,
updated:new Date()

});

await db.collection("trackingHistory")
.add({

name:user,
lat:p.coords.latitude,
lon:p.coords.longitude,
date:getDate(new Date()),
time:new Date()

});

}

);

},10000);

}

// ===============================
// PUNCH OUT
// ===============================

async function punchOut(){

if(trackingInterval){

clearInterval(trackingInterval);

}

await db.collection("liveTracking")
.doc(user)
.delete();

alert("Punch Out Success");

}

// ===============================
// LIVE USERS
// ===============================

async function showLiveUsers(){

if(role!=="admin") return;

liveModal.style.display = "flex";

let snap =
await db.collection("liveTracking").get();

let html = "";

snap.forEach(doc=>{

let x = doc.data();

html += `

<div class="user-card">

<h3>${x.name}</h3>

<div class="online">
ONLINE
</div>

<br><br>

<button
class="live-btn"
onclick="openMap('${x.lat}','${x.lon}')">

📡 Live Location

</button>

<button
class="map-btn"
onclick="showPlayback('${x.name}')">

🛣 Playback

</button>

</div>

`;

});

liveUsersList.innerHTML =
html || "No Live Users";

}

// ===============================
// PLAYBACK
// ===============================

let playbackMap = null;

async function showPlayback(name){

playbackModal.style.display = "flex";

let snap =
await db.collection("trackingHistory")
.where("name","==",name)
.get();

let points = [];

snap.forEach(doc=>{

points.push(doc.data());

});

if(points.length===0){

alert("No Data");

return;

}

points.sort((a,b)=>{

return new Date(a.time.seconds*1000) -
new Date(b.time.seconds*1000);

});

if(playbackMap){

playbackMap.remove();

}

playbackMap =
L.map("playbackMap").setView(
[points[0].lat,points[0].lon],
15
);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(playbackMap);

let latlngs =
points.map(p=>[p.lat,p.lon]);

let line =
L.polyline(latlngs,{
color:'blue',
weight:5
}).addTo(playbackMap);

playbackMap.fitBounds(
line.getBounds()
);

L.marker(
[points[0].lat,points[0].lon]
).addTo(playbackMap);

setTimeout(()=>{

playbackMap.invalidateSize();

},300);

}

// ===============================
// LOAD DATA
// ===============================

async function loadData(){

let snap =
await db.collection("attendance").get();

allData =
snap.docs.map(d=>({
id:d.id,
...d.data()
}));

renderCalendar();

}

// ===============================
// CALENDAR
// ===============================

function renderCalendar(){

calendarGrid.innerHTML = "";

let {start,end} =
getMonthRange();

monthLabel.innerText =
getDate(start) + " → " + getDate(end);

let temp = new Date(start);

while(temp<=end){

let full = getDate(temp);

let found =
role==="admin"
?
allData.some(x=>x.date===full)
:
allData.some(
x=>x.date===full && x.name===user
);

let today =
getDate(new Date())===full;

calendarGrid.innerHTML += `

<div
class="day ${found?'p':'a'} ${today?'today':''}"
onclick="showDay('${full}')"
>

${temp.getDate()}

<br>

<small>
${temp.toLocaleDateString(
'en-IN',
{weekday:'short'}
)}
</small>

</div>

`;

temp.setDate(temp.getDate()+1);

}

}

// ===============================
// SHOW DAY
// ===============================

function showDay(date){

selectedDate = date;

let list =
role==="admin"
?
allData.filter(x=>x.date===date)
:
allData.filter(
x=>x.date===date && x.name===user
);

if(list.length===0){

engineerList.innerHTML =
"No Attendance";

return;

}

let users = {};

list.forEach(x=>users[x.name]=x);

let unique =
Object.values(users);

engineerList.innerHTML =
unique.map(x=>{

let s =
getSalaryMonthData(x.name);

return `

<div class="user-card">

<h3>👷 ${x.name}</h3>

<div>
📍 ${x.place || "No Place"}
</div>

<div class="salary-box">

📅 Salary Month :
<b>${s.range}</b>

<br>

✅ Attendance :
<b>${s.attendance} Days</b>

<br>

💵 Monthly Salary :
<b>₹${s.monthlySalary}</b>

<br>

📆 Per Day Salary :
<b>₹${s.perDay}</b>

<br>

🏦 Earned Salary :
<b style="color:#00ff95;">
₹${s.earned}
</b>

</div>

<br>

<button
class="map-btn"
onclick="openMap('${x.lat}','${x.lon}')">

🗺 Attendance Location

</button>

${
role==="admin"
?
`
<button
class="delete-btn"
onclick="deleteAttendance('${x.id}')">

🗑 Delete

</button>
`
:
""
}

</div>

`;

}).join("");

}

// ===============================
// DELETE
// ===============================

async function deleteAttendance(id){

if(role!=="admin") return;

let ok =
confirm("Delete Attendance ?");

if(!ok) return;

await db.collection("attendance")
.doc(id)
.delete();

alert("Deleted");

loadData();

}

// ===============================
// MAP
// ===============================

function openMap(lat,lon){

window.open(
`https://www.google.com/maps?q=${lat},${lon}`,
"_blank"
);

}

// ===============================
// MONTH
// ===============================

function prevMonth(){

currentDate.setMonth(
currentDate.getMonth()-1
);

renderCalendar();

}

function nextMonth(){

currentDate.setMonth(
currentDate.getMonth()+1
);

renderCalendar();

}

// ===============================
// DOWNLOAD CSV
// ===============================

function downloadCSV(){

let from = fromDate.value;
let to = toDate.value;

if(!from || !to){

alert("Select Date");

return;

}

let filtered =
allData.filter(
x=>x.date>=from && x.date<=to
);

let csv =
"Name,Date,Place,Latitude,Longitude\n";

filtered.forEach(x=>{

csv +=
`${x.name},${x.date},${x.place},${x.lat},${x.lon}\n`;

});

let blob =
new Blob([csv]);

let a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"attendance.csv";

a.click();

}

// ===============================
// DASHBOARD
// ===============================

function goDashboard(){

window.location.href =
"dashboard.html";

}

// ===============================
// LOGOUT
// ===============================

function logout(){

localStorage.clear();

window.location.href =
"login.html";

}

// ===============================

window.onload = loadData;

</script>

</body>
</html>
