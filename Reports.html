*{

body{

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:100;
}

.navbar h2{
font-size:22px;
}

.navbar button{
background:#22c55e;
border:none;
padding:10px 16px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* MONTH */

.month-box{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
padding:15px;
}

.month-box button{
padding:8px 15px;
border:none;
border-radius:10px;

color:white;
cursor:pointer;

}

/* CALENDAR */

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
padding:15px;
}

.day{
padding:15px 5px;
text-align:center;
border-radius:15px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.day:hover{
transform:scale(1.08);
box-shadow:0 0 15px rgba(255,255,255,0.5);
}

/* FAB */

.fab{
position:fixed;
bottom:25px;
right:25px;
width:70px;
height:70px;
border-radius:50%;
background:linear-gradient(135deg,#00c6ff,#0072ff);
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
z-index:1000;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
padding:10px;
z-index:2000;
}

.modal-box{
width:100%;
max-width:850px;
max-height:95vh;
overflow:auto;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:25px;

}

.modal-title{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
text-align:center;

grid-template-columns:1fr 1fr;
gap:15px;

.form-card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.1);

.form-card label{

margin-bottom:8px;
font-size:14px;
color:#ddd;

input,

width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#111827;
color:white;
font-size:15px;

.full{

.button-group{

.button-group button{

padding:14px;
border:none;
border-radius:14px;

function normalizeImportDate(value){

    if(!value) return "";

    // Excel Serial Number
    if(typeof value === "number"){

        const d = XLSX.SSF.parse_date_code(value);

        return `${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`;

    }

    let txt = String(value).trim();

    // DD-MM-YYYY or DD/MM/YYYY
    if(txt.includes("-") || txt.includes("/")){

        let s = txt.replace(/\//g,"-").split("-");

        if(s.length===3){

            if(s[0].length===4){

                return `${s[0]}-${s[1].padStart(2,"0")}-${s[2].padStart(2,"0")}`;

            }else{

                return `${s[2]}-${s[1].padStart(2,"0")}-${s[0].padStart(2,"0")}`;

            }

        }

    }

    return txt;

}
window.startImport = async function(){

    const file = document.getElementById("importFile").files[0];

    if(!file){
        alert("Select CSV/XLSX File");
        return;
    }

    const reader = new FileReader();

    reader.onload = async function(e){

        try{

            const data = new Uint8Array(e.target.result);

            const workbook = XLSX.read(data,{type:"array"});

            const sheetName = workbook.SheetNames[0];

            const sheet = workbook.Sheets[sheetName];

            const rows = XLSX.utils.sheet_to_json(sheet,{
                defval:""
            });

            if(rows.length===0){
                alert("File Empty");
                return;
            }

            // Required Header Check
            const firstRow = rows[0];

            const required = [
                "AREA",
                "Indus Id",
                "Escort Team",
                "Date"
            ];

            for(const h of required){

                if(!(h in firstRow)){
                    alert("Missing Column : " + h);
                    return;
                }

            }

            const importData = [];

            rows.forEach(row=>{

                importData.push({

                    area : String(row["AREA"] || "").trim(),

                    indusId : String(row["Indus Id"] || "").trim(),

                    name : String(row["Escort Team"] || "").trim(),

                    escortTeam : String(row["Escort Team"] || "").trim(),

                    date : normalizeImportDate(row["Date"]),

                    type : "Import",

                    imported : true

                });

            });

            // Firestore Save
            const batch = writeBatch(db);

            importData.forEach(row=>{

                const ref = doc(collection(db,"reports"));

                batch.set(ref,{

                    area: row.area,

                    indusId: row.indusId,

                    name: row.name,

                    escortTeam: row.escortTeam,

                    date: row.date,

                    type: "Import",

                    imported: true,

                    createdAt: serverTimestamp()

                });

            });

            await batch.commit();

            document.getElementById("importStatus").innerHTML =
            "✅ Import Completed : " + importData.length;

            alert(importData.length + " Reports Imported Successfully");

            closeImportModal();

            await loadData();

        }
        catch(err){

            console.error(err);

            alert("Import Failed : " + err.message);

        }

    };

    reader.readAsArrayBuffer(file);

};

window.handleFiles = async function(input){

let files = Array.from(input.files);

if(files.length < 1){
alert("Minimum 1 Photo Required");
input.value = "";
return;
}

if(files.length > 5){
alert("Maximum 5 Photos Allowed");

};

"⏳ Processing Photos...";

for(let file of files){

compressedFiles.push(compressed);
}else{
compressedFiles.push(file);
}

}

input.compressedFiles = compressedFiles;

input.setAttribute("data-ready", "true");

document.getElementById("uploadStatus").innerHTML =
`✅ ${compressedFiles.length} Photos Ready`;

/* IMAGE COMPRESS */

async function compressImage(file){

return new Promise(resolve=>{

let img = new Image();

let reader = new FileReader();

reader.onload = e=>{

img.src = e.target.result;

};

img.onload = ()=>{

let canvas =
document.createElement("canvas");

let ctx =
canvas.getContext("2d");

let maxWidth = 1280;

let scale =
maxWidth / img.width;

canvas.width = maxWidth;

canvas.height =
img.height * scale;

ctx.drawImage(
img,
0,
0,
canvas.width,
canvas.height
);

canvas.toBlob(blob=>{

resolve(
new File(
[blob],
file.name,
{
type:"image/jpeg"
}
)
);

},
"image/jpeg",
0.7);

};

reader.readAsDataURL(file);

});

}

}
);

let data = await response.json();

if(data.error){
throw data.error.message;
}

return data.secure_url;

}

x.photos ? x.photos.join(" | ") : ""

]);

});

/* CSV */

let csv =
rows.map(row =>

row.map(value =>

`"${String(value).replace(/"/g,'""')}"`

).join(",")

).join("\n");

/* DOWNLOAD */

let blob =
new Blob(
[csv],
{
type:"text/csv"
}
);

let a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
`${type}_reports.csv`;

a.click();

closeDownloadModal();

};

currentDate.setMonth(
currentDate.getMonth()-1
);

renderCalendar();

};
window.downloadFile = function(url){

const link = document.createElement("a");

link.href = url.replace(
"/upload/",
"/upload/fl_attachment/"
);

link.target = "_self";

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

window.changePhoto = async function(reportId, photoIndex){

const input = document.createElement("input");
input.type = "file";
input.accept = "image/*";

input.onchange = async function(){

const file = input.files[0];
if(!file) return;

try{

alert("Uploading New Photo...");

const newUrl = await uploadToCloudinary(file);

const report = allData.find(x => x.id === reportId);

if(!report || !report.photos) return;

report.photos[photoIndex] = newUrl;

await updateDoc(
doc(db,"reports",reportId),
{
photos: report.photos
}
);

alert("✅ Photo Updated");

loadData();
showDay(report.date);

}
catch(e){

console.log(e);
alert("❌ Update Failed");

}

};

input.click();

};

window.downloadCsvZip = async function(){

const selectedDate =
document.getElementById("csvDownloadDate").value;

const selectedType =
document.getElementById("csvDownloadType").value;

if(!selectedDate){
alert("Select Date");
return;
}

const reports = allData.filter(x =>
x.type === selectedType &&
fixDate(x.date) === selectedDate &&
x.csvFile
);

if(reports.length === 0){
alert("No CSV Found");
return;
}

const zip = new JSZip();

for(let i=0;i<reports.length;i++){

const response =
await fetch(reports[i].csvFile);

const blob =
await response.blob();

zip.file(
reports[i].csvFileName || `CSV_${i+1}.csv`,
blob
);

}

const content =
await zip.generateAsync({
type:"blob"
});

const link =
document.createElement("a");

link.href =
URL.createObjectURL(content);

link.download =
`${selectedType}_${selectedDate}.zip`;

link.click();

URL.revokeObjectURL(link.href);

closeCsvDownloadModal();

};
window.openSearchModal = function(){

document.getElementById("searchModal").style.display = "flex";

document.getElementById("searchInput").value = "";

document.getElementById("searchResults").innerHTML = "";

document.getElementById("searchInput").focus();

}
document.addEventListener("input", function(e){

if(e.target.id==="searchInput"){

searchReports(e.target.value);

}

});

window.closeSearchModal = function(){

document.getElementById("searchModal").style.display = "none";

}
window.highlightSearch = function(text, keyword){

text = String(text || "");

if(!keyword) return text;

const reg = new RegExp(keyword,"ig");

return text.replace(reg,function(match){

return `
<span style="
background:#facc15;
color:black;
padding:2px 4px;
border-radius:4px;
font-weight:bold;
">
${match}
</span>
`;

});

}
window.searchReports = function(keyword){

keyword = keyword.trim().toLowerCase();

const resultBox =
document.getElementById("searchResults");

if(keyword===""){

resultBox.innerHTML = `
<div style="
text-align:center;
padding:30px;
opacity:.7;
">
Type anything to search...
</div>
`;

return;

}

const results = allData.filter(x=>{

return (

String(x.indusId || "")
.toLowerCase()
.includes(keyword)

||

String(x.sensorNo || "")
.toLowerCase()
.includes(keyword)

||

String(x.rgno || "")
.toLowerCase()
.includes(keyword)

||

String(x.assetcode || "")
.toLowerCase()
.includes(keyword)

||

String(x.imei || "")
.toLowerCase()
.includes(keyword)

||

String(x.category || "")
.toLowerCase()
.includes(keyword)

||

String(x.installationType || "")
.toLowerCase()
.includes(keyword)

||

String(x.usedWire || "")
.toLowerCase()
.includes(keyword)

||

String(x.name || "")
.toLowerCase()
.includes(keyword)

||

String(x.date || "")
.toLowerCase()
.includes(keyword)

);

});

if(results.length===0){

resultBox.innerHTML = `
<div style="
text-align:center;
padding:30px;
color:#ffb4b4;
">
❌ No Report Found

`;

}
const k = keyword;
let html="";

results.forEach(r=>{
const photo =
r.photos && r.photos.length
? r.photos[0]
: "";

html+=`

<div
onclick="openSearchResult('${r.id}')"
style="
background:#111827;
border-radius:18px;

cursor:pointer;
transition:.3s;

gap:15px;

flex-shrink:0;
">

<div style="flex:1;">

<div style="
font-size:17px;
font-weight:bold;
margin-bottom:5px;
">
👤 ${highlightSearch(r.name,k)}
</div>

<div>
📅 ${highlightSearch(r.date,k)}
</div>

<div>
📌 ${highlightSearch(r.type,k)}
</div>

<div>
🆔 ${highlightSearch(r.indusId,k)}
</div>

<div>
🔢 ${highlightSearch(r.sensorNo,k)}
</div>

<div>
🏢 ${highlightSearch(r.assetcode || r.rgno || "-",k)}
</div>

</div>

</div>

`;

});

resultBox.innerHTML = html;

}
function formatIndusId(value){

    if(!value) return "";

    const numbers = String(value).replace(/\D/g, "");

    return numbers ? "IN-" + numbers : "";
}
