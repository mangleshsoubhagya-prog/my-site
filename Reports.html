<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Poppins;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:100;
}

.navbar h2{
font-size:22px;
}

.navbar button{
background:#22c55e;
border:none;
padding:10px 16px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* MONTH */

.month-box{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
padding:15px;
}

.month-box button{
padding:8px 15px;
border:none;
border-radius:10px;
background:#111827;
color:white;
cursor:pointer;
font-size:18px;
}

/* CALENDAR */

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
padding:15px;
}

.day{
padding:15px 5px;
text-align:center;
border-radius:15px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.day:hover{
transform:scale(1.08);
box-shadow:0 0 15px rgba(255,255,255,0.5);
}

/* FAB */

.fab{
position:fixed;
bottom:25px;
right:25px;
width:70px;
height:70px;
border-radius:50%;
background:linear-gradient(135deg,#00c6ff,#0072ff);
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
z-index:1000;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
padding:10px;
z-index:2000;
}

.modal-box{
width:100%;
max-width:850px;
max-height:95vh;
overflow:auto;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:25px;
padding:25px;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.modal-title{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
text-align:center;
}

/* FORM */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.form-card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.1);
}

.form-card label{
display:block;
margin-bottom:8px;
font-size:14px;
color:#ddd;
}

input,
select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#111827;
color:white;
font-size:15px;
outline:none;
}

.full{
grid-column:span 2;
}

/* BUTTONS */

.button-group{
display:flex;
gap:10px;
margin-top:20px;
}

.button-group button{
flex:1;
padding:14px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.submit{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
}

.close{
background:linear-gradient(135deg,#ef4444,#dc2626);
color:white;
}

/* VIEW */

#viewSection{
display:none;
}

.report-card{
background:#111827;
padding:15px;
border-radius:18px;
margin-bottom:15px;
position:relative;
}

.media{
width:100%;
margin-top:10px;
border-radius:15px;
}

.delete-btn{
position:absolute;
top:10px;
right:10px;
width:35px;
height:35px;
border:none;
border-radius:50%;
background:red;
color:white;
font-weight:bold;
cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:span 1;
}

#calendar{
grid-template-columns:repeat(4,1fr);
}

}

</style>

</head>

<body>

<div class="navbar">

<h2>💼 Reports System</h2>

<div style="display:flex;gap:10px;">

<button onclick="refreshData()">
🔄 Refresh
</button>

<button onclick="openDownloadOptions()">
⬇ Download
</button>

<div class="modal-box">

<div id="viewSection"></div>

<div class="form-card">

onclick="document.getElementById('videoFile').click()">

<div style="margin-top:10px;">

  <div id="videoProgressContainer"
       style="width:100%;height:10px;background:#111827;border-radius:10px;overflow:hidden;display:none;">
    <div id="videoProgressBar"
         style="height:10px;width:0%;background:linear-gradient(135deg,#00c6ff,#0072ff);"></div>

       style="margin-top:5px;font-size:13px;color:#fff;"></div>

</div>


<div id="videoStatus"
style="margin-top:8px;font-size:13px;color:#fff;">
No Video Uploaded
</div>

</div>

<div class="form-card full">

<label>Reports Photo</label>

<input type="file"
id="videoFile"
accept="video/*"
style="display:none"
onchange="uploadVideo(this)">

<input
type="file"
id="reportPhoto"
required
accept="image/*"
multiple
onchange="handleFiles(this)">
<div id="reportPhotoStatus"
style="margin-top:8px;font-size:13px;color:#fff;">

</div>

</div>

<div class="full">

<div id="uploadStatus"
style="
margin-top:10px;
text-align:center;
font-weight:bold;
"></div>

</div>

<div class="button-group">

<button
class="submit"
id="submitBtn"
onclick="submitWorking()">

Submit

</button>

<button
class="close"
onclick="closeModal()">

Close

</div>

</div>

</div>

</div>
<!-- DOWNLOAD MODAL -->

<div class="modal" id="downloadModal">

<div class="modal-box" style="max-width:400px;">

<div class="modal-title">
📥 Download Reports

<div class="button-group" style="flex-direction:column;">

<button
class="submit"
onclick="downloadReportsByType('GPS')">

🛰 Download GPS Reports

<button
class="submit"
onclick="downloadReportsByType('Sensor')">

⚙ Download Sensor Reports

Close

</div>

</div>
<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyAbjZrPfGx0UTBAW4HndPxf9mMhhmg513s",

authDomain: "attendance-system-fc71c.firebaseapp.com",

projectId: "attendance-system-fc71c",

storageBucket: "attendance-system-fc71c.appspot.com",

messagingSenderId: "57089003187",

appId: "1:57089003187:web:dc8864aa56701384d6aac6"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* CLOUDINARY */

const CLOUD_NAME = "dhs6u2y6l";
const UPLOAD_PRESET = "expense_upload";

window.uploadedVideos = [];

window.currentDate = new Date();
window.allData = [];

const currentUser = localStorage.getItem("user") || "Guest";
window.currentUser = currentUser;

const ADMIN_USERS = [
"Admin",
"Manglesh",
"Bhavy"
];

const isAdmin =
ADMIN_USERS.includes(currentUser);

/* DASHBOARD */

window.goDashboard = function(){

window.location.href =
"dashboard.html";

};
window.refreshData = async function(){

let btns = document.querySelectorAll(".navbar button");

btns.forEach(btn => btn.disabled = true);

try{

await loadData();

alert("✅ Data Refreshed");

}
catch(e){

alert("❌ Refresh Failed");

}

btns.forEach(btn => btn.disabled = false);

};
/* DATE */

window.fixDate = function(d){

let date = new Date(d);

return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;

};

/* MODAL */

window.openModal = function(){

document.getElementById("modal").style.display =
"flex";

document.getElementById("formSection").style.display =
"block";

document.getElementById("viewSection").style.display =
"none";

document.getElementById("date").value = "";

document.getElementById("name").value =
currentUser;

};

window.closeModal = function(){

document.getElementById("modal").style.display =
"none";

};

/* TYPE */

window.toggleFields = function(){

let type =
document.getElementById("type").value;

document.getElementById("gpsFields").style.display =
type==="GPS" ? "block" : "none";

document.getElementById("sensorFields").style.display =
type==="Sensor" ? "block" : "none";

};

/* FILE HANDLE */

/* MULTIPLE FILE HANDLE */

window.handleFiles = async function(input){

let files = Array.from(input.files);

if(files.length < 1){

alert("Minimum 1 Photo Required");
input.value = "";
return;

}

if(files.length > 5){

alert("Maximum 5 Photos Allowed");
input.value = "";
return;

}

document.getElementById("uploadStatus").innerHTML =
"⏳ Processing Photos...";

let compressedFiles = [];

for(let file of files){

if(file.type.startsWith("image/")){

let compressed =
await compressImage(file);

compressedFiles.push(compressed);

}else{

compressedFiles.push(file);

}

}

input.compressedFiles = compressedFiles;

document.getElementById("uploadStatus").innerHTML =
`✅ ${compressedFiles.length} Photos Ready`;

};
/* IMAGE COMPRESS */

async function compressImage(file){

return new Promise(resolve=>{

let img = new Image();

let reader = new FileReader();

reader.onload = e=>{

img.src = e.target.result;

};

img.onload = ()=>{

let canvas =
document.createElement("canvas");

let ctx =
canvas.getContext("2d");

let maxWidth = 1280;

let scale =
maxWidth / img.width;

canvas.width = maxWidth;

canvas.height =
img.height * scale;

ctx.drawImage(
img,
0,
0,
canvas.width,
canvas.height
);

canvas.toBlob(blob=>{

resolve(
new File(
[blob],
file.name,
{
type:"image/jpeg"
}
)
);

},
"image/jpeg",
0.7);

};

reader.readAsDataURL(file);

});

}

/* CLOUDINARY IMAGE */

async function uploadToCloudinary(file){

let formData = new FormData();

formData.append("file", file);

formData.append(
"upload_preset",
UPLOAD_PRESET
);

let response = await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{
method:"POST",
body:formData
}
);

let data = await response.json();

if(data.error){

throw data.error.message;

}

return data.secure_url;

}

/* VIDEO UPLOADER */
/* VIDEO UPLOADER FINAL FIX */
window.uploadVideo = function(input){

let file = input.files[0];
if(!file){
alert("No video selected");
return;
}

let progressContainer = document.getElementById("videoProgressContainer");
let progressBar = document.getElementById("videoProgressBar");
let percentText = document.getElementById("videoPercent");
let status = document.getElementById("videoStatus");

progressContainer.style.display = "block";
progressBar.style.width = "0%";
percentText.innerText = "0%";
status.innerHTML = "⏳ Uploading...";

let formData = new FormData();
formData.append("file", file);
formData.append("upload_preset", UPLOAD_PRESET);

let xhr = new XMLHttpRequest();

xhr.open(
  "POST",
  `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`
);

// PROGRESS BAR
xhr.upload.onprogress = function(e){

if(e.lengthComputable){

let percent = Math.round((e.loaded / e.total) * 100);

progressBar.style.width = percent + "%";
percentText.innerText = percent + "% Uploaded";

}

};

// SUCCESS
xhr.onload = function(){

let data = JSON.parse(xhr.responseText);

if(data.secure_url){

window.tempVideo = {
url: data.secure_url,
public_id: data.public_id
};

document.getElementById("videoLink").value = data.secure_url;

// PREVIEW
status.innerHTML = `
<video src="${data.secure_url}" controls
style="width:100%;margin-top:10px;border-radius:10px;"></video>

<br>

<button type="button" class="close"
onclick="removeVideo()" style="margin-top:10px;">
❌ Remove Video
</button>
`;

progressBar.style.width = "100%";
percentText.innerText = "Upload Complete";

}else{
status.innerHTML = "❌ Upload Failed";
}

};

// ERROR
xhr.onerror = function(){
status.innerHTML = "❌ Upload Failed";
alert("Video upload failed");
};

xhr.send(formData);

};

window.removeVideo = function(){

window.tempVideo = null;

document.getElementById("videoFile").value = "";
document.getElementById("videoLink").value = "";

document.getElementById("videoStatus").innerHTML =
"No Video Uploaded";

document.getElementById("videoProgressContainer").style.display = "none";
document.getElementById("videoProgressBar").style.width = "0%";
document.getElementById("videoPercent").innerText = "";

};
window.closeModal = function(){

document.getElementById("modal").style.display = "none";

// CLEAN VIDEO TEMP DATA
window.tempVideo = null;

document.getElementById("videoFile").value = "";
document.getElementById("videoLink").value = "";
document.getElementById("videoStatus").innerHTML = "No Video Uploaded";

document.getElementById("videoProgressContainer").style.display = "none";
document.getElementById("videoProgressBar").style.width = "0%";
document.getElementById("videoPercent").innerText = "";

};
/* SUBMIT */

window.submitWorking = async function(){

/* VALIDATION */

let type =
document.getElementById("type").value;

if(!document.getElementById("date").value){
alert("Select Date");
return;
}

if(!document.getElementById("name").value){
alert("Enter Engineer Name");
return;
}

if(!type){
alert("Select Type");
return;
}

/* GPS */

if(type==="GPS"){

if(!document.getElementById("rgno").value){
alert("Enter RG No.");
return;
}

if(!document.getElementById("assetcode").value){
alert("Enter Asset Code");
return;
}

if(!document.getElementById("imei").value){
alert("Enter IMEI No.");
return;
}

if(!document.getElementById("gpsSensorNo").value){
alert("Enter Sensor No.");
return;
}

if(!document.getElementById("gpsPhoto").files[0]){
alert("Upload Installation Photo");
return;
}

}

/* SENSOR */

if(type==="Sensor"){

if(!document.getElementById("installationType").value){
alert("Select Installation Type");
return;
}

if(!document.getElementById("indusId").value){
alert("Enter Indus ID");
return;
}

if(!document.getElementById("usedWire").value){
alert("Enter Used Wire");
return;
}

if(!document.getElementById("sensorNo").value){
alert("Enter Sensor No.");
return;
}

if(!document.getElementById("videoLink").value){
alert("Upload Video");
return;
}

if(!document.getElementById("reportPhoto").files[0]){
alert("Upload Reports Photo");
return;
}

}

let btn =
document.getElementById("submitBtn");

btn.disabled = true;

btn.innerHTML =
"Saving...";

try{

let type =
document.getElementById("type").value;

let saveData = {

date:
fixDate(
document.getElementById("date").value
),

name:
document.getElementById("name").value,

type:type,

createdAt:Date.now()

};

/* GPS */

if(type==="GPS"){

saveData.rgno =
document.getElementById("rgno").value;

saveData.assetcode =
document.getElementById("assetcode").value;

saveData.imei =
document.getElementById("imei").value;

saveData.sensorNo =
document.getElementById("gpsSensorNo").value;

let photo =
document.getElementById("gpsPhoto");

if(photo.files.length > 0){

document.getElementById("gpsPhotoStatus").innerHTML =
"⏳ Uploading Photos...";

saveData.photos = [];

let filesToUpload =
photo.compressedFiles || Array.from(photo.files);

for(let file of filesToUpload){

let url =
await uploadToCloudinary(file);

saveData.photos.push(url);

}

document.getElementById("gpsPhotoStatus").innerHTML =
"✅ Photos Uploaded";

}
}

/* SENSOR */

if(type==="Sensor"){

saveData.installationType =
document.getElementById("installationType").value;

saveData.usedWire =
document.getElementById("usedWire").value;

saveData.sensorNo =
document.getElementById("sensorNo").value;

saveData.indusId =
document.getElementById("indusId").value;

/* VIDEO LINK */

saveData.video = window.tempVideo ? window.tempVideo.url : "";

/* PHOTO */

let photo =
document.getElementById("reportPhoto");

if(photo.files.length > 0){

document.getElementById("reportPhotoStatus").innerHTML =
"⏳ Uploading Photos...";

saveData.photos = [];

let filesToUpload =
photo.compressedFiles || Array.from(photo.files);

for(let file of filesToUpload){

let url =
await uploadToCloudinary(file);

saveData.photos.push(url);

}

document.getElementById("reportPhotoStatus").innerHTML =
"✅ Photos Uploaded";

}

}

/* FIREBASE SAVE */

await addDoc(
collection(db,"reports"),
saveData
);

alert("✅ Saved Successfully");

resetForm();

closeModal();

loadData();

}
catch(e){

console.log(e);

alert("❌ Error : " + e);

}

btn.disabled = false;

btn.innerHTML = "Submit";

};

/* RESET */

window.resetForm = function(){

document.getElementById("type").value = "";

document.getElementById("gpsFields").style.display = "none";
document.getElementById("sensorFields").style.display = "none";

document.querySelectorAll("input").forEach(x=>{
if(x.type !== "date"){
x.value = "";
}
});

document.getElementById("gpsPhoto").value = "";
document.getElementById("reportPhoto").value = "";
document.getElementById("videoFile").value = "";

// CLEAR TEMP VIDEO
window.tempVideo = null;

// CLEAR UI
document.getElementById("videoStatus").innerHTML = "No Video Uploaded";
document.getElementById("gpsPhotoStatus").innerHTML = "";
document.getElementById("reportPhotoStatus").innerHTML = "";
document.getElementById("uploadStatus").innerHTML = "";

document.getElementById("videoProgressContainer").style.display = "none";
document.getElementById("videoProgressBar").style.width = "0%";
document.getElementById("videoPercent").innerText = "";

};
/* LOAD DATA */

window.loadData = async function(){

let q =
query(
collection(db,"reports"),
orderBy("createdAt","desc")
);

let snap =
await getDocs(q);

allData = [];
snap.forEach(docSnap=>{

let data = {

id:docSnap.id,
...docSnap.data()

};

/* ADMIN = SEE ALL */

if(isAdmin){

allData.push(data);

}

/* USER = SEE ONLY OWN */

else{

if(data.name === currentUser){

allData.push(data);

}

}

});

renderCalendar();

};

/* CALENDAR */

window.renderCalendar = function(){

let year =
currentDate.getFullYear();

let month =
currentDate.getMonth();

document.getElementById("monthLabel").innerHTML =
currentDate.toLocaleString(
"default",
{
month:"long",
year:"numeric"
}
);

let firstDay =
new Date(year,month,1).getDay();

let days =
new Date(year,month+1,0).getDate();

let html = "";

for(let i=0;i<firstDay;i++){

html += "<div></div>";

}

for(let d=1; d<=days; d++){

let date =
`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

let found =
allData.some(
x=>fixDate(x.date)===date
);
let reports =
allData.filter(
x=>fixDate(x.date)===date
);

let total =
reports.length;

let names =
[...new Set(reports.map(x=>x.name))].join(", ");

html += `

<div
class="day"
onclick="showDay('${date}')"
style="
background:${found ? '#22c55e' : '#ef4444'};
padding:10px;
min-height:90px;
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
font-size:12px;
">

<div style="
font-size:18px;
font-weight:bold;
">
${d}
</div>

${
found
?

`

<div style="
font-size:11px;
text-align:center;
line-height:1.3;
word-break:break-word;
">

👤 ${names}

<br>

📦 ${total} Report

</div>

`

:

`<div style="font-size:10px;">No Data</div>`

}

</div>

`;

}

document.getElementById("calendar").innerHTML =
html;

};

/* DELETE */

window.deleteEntry = async function(id){

if(!isAdmin){

alert("❌ Only Admin Can Delete");

return;

}

if(!confirm("Delete Entry?")) return;

try{

await deleteDoc(
doc(db,"reports",id)
);

alert("✅ Deleted");

closeModal();

loadData();

}
catch(e){

console.log(e);

alert("❌ Delete Failed");

}

};

/* DOWNLOAD CSV */

window.downloadReportsByType = function(type){

let rows = [[
"Date",
"Name",
"Type",
"RG No",
"Asset Code",
"IMEI",
"Sensor No",
"Installation Type",
"Used Wire",
"Indus ID",
"Video Link",
"Photos"
]];

/* FILTER DATA */

let filtered =
allData.filter(x => x.type === type);

filtered.forEach(x=>{

rows.push([

x.date || "",
x.name || "",
x.type || "",

/* GPS */
x.rgno || "",
x.assetcode || "",
x.imei || "",

/* COMMON */
x.sensorNo || "",

/* SENSOR */
x.installationType || "",
x.usedWire || "",
x.indusId || "",

/* VIDEO */
x.video || "",

/* PHOTOS */
x.photos ? x.photos.join(" | ") : ""

]);

});

/* CSV */

let csv =
rows.map(row =>

row.map(value =>

`"${String(value).replace(/"/g,'""')}"`

).join(",")

).join("\n");

/* DOWNLOAD */

let blob =
new Blob(
[csv],
{
type:"text/csv"
}
);

let a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
`${type}_reports.csv`;

a.click();

closeDownloadModal();

};

window.prevMonth = function(){

currentDate.setMonth(
currentDate.getMonth()-1
);

renderCalendar();

};

window.nextMonth = function(){

currentDate.setMonth(
currentDate.getMonth()+1
);

renderCalendar();

};

loadData();
