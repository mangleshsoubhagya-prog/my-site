<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:Poppins;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:100;
}

.navbar h2{
font-size:22px;
}

.navbar button{
background:#22c55e;
border:none;
padding:10px 16px;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

/* MONTH */

.month-box{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
padding:15px;
}

.month-box button{
padding:8px 15px;
border:none;
border-radius:10px;
background:#111827;
color:white;
cursor:pointer;
font-size:18px;
}

/* CALENDAR */

#calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
padding:15px;
}

.day{
padding:15px 5px;
text-align:center;
border-radius:15px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.day:hover{
transform:scale(1.08);
box-shadow:0 0 15px rgba(255,255,255,0.5);
}

/* FAB */

.fab{
position:fixed;
bottom:25px;
right:25px;
width:70px;
height:70px;
border-radius:50%;
background:linear-gradient(135deg,#00c6ff,#0072ff);
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
z-index:1000;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
padding:10px;
z-index:2000;
}

.modal-box{
width:100%;
max-width:850px;
max-height:95vh;
overflow:auto;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:25px;
padding:25px;
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

.modal-title{
font-size:28px;
font-weight:bold;
margin-bottom:20px;
text-align:center;
}

/* FORM */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.form-card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:18px;
border:1px solid rgba(255,255,255,0.1);
}

.form-card label{
display:block;
margin-bottom:8px;
font-size:14px;
color:#ddd;
}

input,
select{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#111827;
color:white;
font-size:15px;
outline:none;
}

.full{
grid-column:span 2;
}

/* BUTTONS */

.button-group{
display:flex;
gap:10px;
margin-top:20px;
}

.button-group button{
flex:1;
padding:14px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.submit{
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
}

.close{
background:linear-gradient(135deg,#ef4444,#dc2626);
color:white;
}

/* VIEW */

#viewSection{
display:none;
}

.report-card{
background:#111827;
padding:15px;
border-radius:18px;
margin-bottom:15px;
position:relative;
}

.media{
width:100%;
margin-top:10px;
border-radius:15px;
}

.delete-btn{
position:absolute;
top:10px;
right:10px;
width:35px;
height:35px;
border:none;
border-radius:50%;
background:red;
color:white;
font-weight:bold;
cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

.form-grid{
grid-template-columns:1fr;
}

.full{
grid-column:span 1;
}

#calendar{
grid-template-columns:repeat(4,1fr);
}

}

</style>

</head>

<body>

<div class="navbar">

<h2>💼 Reports System</h2>

<div style="display:flex;gap:10px;">

<button onclick="downloadReports()">
⬇ Download
</button>

<button onclick="goDashboard()">
🏠 Dashboard
</button>

</div>

</div>

<div class="month-box">

<button onclick="prevMonth()">⬅</button>

<h3 id="monthLabel"></h3>

<button onclick="nextMonth()">➡</button>

</div>

<div id="calendar"></div>

<div class="fab" onclick="openModal()">+</div>

<div class="modal" id="modal">

<div class="modal-box">

<div id="viewSection"></div>

<div id="formSection">

<div class="modal-title">
💸 Entry Form
</div>

<div class="form-grid">

<div class="form-card">
<label>Date</label>
<input type="date" id="date">
</div>

<div class="form-card">
<label>Engineer Name</label>
<input id="name">
</div>

<div class="form-card full">

<label>Select Type</label>

<select id="type" onchange="toggleFields()">

<option value="">Select Type</option>

<option value="GPS">GPS</option>

<option value="Sensor">Sensor</option>

</select>

</div>

<!-- GPS -->

<div id="gpsFields" class="full" style="display:none;">

<div class="form-grid">

<div class="form-card">
<label>RG No.</label>
<input id="rgno">
</div>

<div class="form-card">
<label>Asset Code</label>
<input id="assetcode">
</div>

<div class="form-card">
<label>IMEI No.</label>
<input id="imei">
</div>

<div class="form-card">
<label>Sensor No.</label>
<input id="gpsSensorNo">
</div>

<div class="form-card full">

<label>Installation Photo</label>

<input
type="file"
id="gpsPhoto"
accept="image/*"
onchange="handleFile(this)">

</div>

</div>

</div>

<!-- SENSOR -->

<div id="sensorFields" class="full" style="display:none;">

<div class="form-grid">

<div class="form-card">

<label>Installation Type</label>

<select id="installationType">

<option value="">Select</option>

<option>New Installation</option>

<option>Rectification</option>

<option>Replacement</option>

</select>

</div>

<div class="form-card">
<label>Used Wire</label>
<input id="usedWire">
</div>

<div class="form-card">
<label>Sensor No.</label>
<input id="sensorNo">
</div>

<div class="form-card">

<label>Installation Video</label>

<input
type="file"
id="sensorVideo"
accept="video/*"
onchange="handleFile(this)">

</div>

<div class="form-card full">

<label>Reports Photo</label>

<input
type="file"
id="reportPhoto"
accept="image/*"
onchange="handleFile(this)">

</div>

</div>

</div>

<div class="full">

<div id="uploadStatus"
style="
margin-top:10px;
text-align:center;
font-weight:bold;
"></div>

</div>

</div>

<div class="button-group">

<button
class="submit"
id="submitBtn"
onclick="submitWorking()">

Submit

</button>

<button
class="close"
onclick="closeModal()">

Close

</button>

</div>

</div>

</div>

</div>

<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
orderBy,
deleteDoc,
doc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyAbjZrPfGx0UTBAW4HndPxf9mMhhmg513s",

authDomain: "attendance-system-fc71c.firebaseapp.com",

projectId: "attendance-system-fc71c",

storageBucket: "attendance-system-fc71c.appspot.com",

messagingSenderId: "57089003187",

appId: "1:57089003187:web:dc8864aa56701384d6aac6"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* CLOUDINARY */

const CLOUD_NAME = "dhs6u2y6l";
const UPLOAD_PRESET = "expense_upload";

window.currentDate = new Date();
window.allData = [];

window.currentUser =
localStorage.getItem("user") || "Guest";

window.goDashboard = function(){

window.location.href = "dashboard.html";

};

window.fixDate = function(d){

let date = new Date(d);

return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;

};

window.openModal = function(){

document.getElementById("modal").style.display="flex";

document.getElementById("formSection").style.display="block";

document.getElementById("viewSection").style.display="none";

document.getElementById("date").value =
fixDate(new Date());

document.getElementById("name").value =
currentUser;

};

window.closeModal = function(){

document.getElementById("modal").style.display="none";

};

window.toggleFields = function(){

let type =
document.getElementById("type").value;

document.getElementById("gpsFields").style.display =
type==="GPS" ? "block" : "none";

document.getElementById("sensorFields").style.display =
type==="Sensor" ? "block" : "none";

};

window.handleFile = async function(input){

let file = input.files[0];

if(!file) return;

if(file.size > 20 * 1024 * 1024){

alert("❌ Max 20MB");
input.value="";
return;

}

document.getElementById("uploadStatus").innerText =
"⏳ Processing...";

if(file.type.startsWith("image/")){

let compressed =
await compressImage(file);

input.compressedFile = compressed;

}else{

input.compressedFile = file;

}

document.getElementById("uploadStatus").innerText =
"✅ Ready";

};

async function compressImage(file){

return new Promise(resolve=>{

let img = new Image();

let reader = new FileReader();

reader.onload = e=>{
img.src = e.target.result;
};

img.onload = ()=>{

let canvas =
document.createElement("canvas");

let ctx =
canvas.getContext("2d");

let maxWidth = 1280;

let scale =
maxWidth / img.width;

canvas.width = maxWidth;

canvas.height =
img.height * scale;

ctx.drawImage(
img,
0,
0,
canvas.width,
canvas.height
);

canvas.toBlob(blob=>{

resolve(
new File(
[blob],
file.name,
{
type:"image/jpeg"
}
)
);

},
"image/jpeg",
0.7);

};

reader.readAsDataURL(file);

});

}

async function uploadToCloudinary(file){

let formData = new FormData();

formData.append("file", file);

formData.append(
"upload_preset",
UPLOAD_PRESET
);

let isVideo =
file.type.startsWith("video/");

let url = isVideo
?
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`
:
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

let response = await fetch(url,{
method:"POST",
body:formData
});

let data = await response.json();

return data.secure_url;

}

window.submitWorking = async function(){

let btn =
document.getElementById("submitBtn");

btn.disabled = true;
btn.innerText = "Saving...";

try{

let type =
document.getElementById("type").value;

let saveData = {

date:
fixDate(
document.getElementById("date").value
),

name:
document.getElementById("name").value,

type:type,

createdAt:Date.now()

};

if(type==="GPS"){

saveData.rgno =
document.getElementById("rgno").value;

saveData.assetcode =
document.getElementById("assetcode").value;

saveData.imei =
document.getElementById("imei").value;

saveData.sensorNo =
document.getElementById("gpsSensorNo").value;

let photo =
document.getElementById("gpsPhoto");

if(photo.files[0]){

document.getElementById("uploadStatus").innerText =
"⏳ Uploading Photo...";

saveData.photo =
await uploadToCloudinary(
photo.compressedFile
);

}

}

if(type==="Sensor"){

saveData.installationType =
document.getElementById("installationType").value;

saveData.usedWire =
document.getElementById("usedWire").value;

saveData.sensorNo =
document.getElementById("sensorNo").value;

let video =
document.getElementById("sensorVideo");

if(video.files[0]){

document.getElementById("uploadStatus").innerText =
"⏳ Uploading Video...";

saveData.video =
await uploadToCloudinary(
video.compressedFile
);

}

let photo =
document.getElementById("reportPhoto");

if(photo.files[0]){

document.getElementById("uploadStatus").innerText =
"⏳ Uploading Photo...";

saveData.photo =
await uploadToCloudinary(
photo.compressedFile
);

}

}

await addDoc(
collection(db,"reports"),
saveData
);

alert("✅ Saved");

resetForm();

closeModal();

loadData();

}catch(e){

console.error(e);

alert("❌ Error");

}

btn.disabled = false;
btn.innerText = "Submit";

};

window.resetForm = function(){

document.querySelectorAll("input").forEach(x=>{

if(x.type!=="date")
x.value="";

});

document.getElementById("uploadStatus").innerText="";

};

window.loadData = async function(){

let q =
query(
collection(db,"reports"),
orderBy("createdAt","desc")
);

let snap =
await getDocs(q);

allData=[];

snap.forEach(docSnap=>{

allData.push({

id:docSnap.id,
...docSnap.data()

});

});

renderCalendar();

};

window.renderCalendar = function(){

let year =
currentDate.getFullYear();

let month =
currentDate.getMonth();

document.getElementById("monthLabel").innerText =
currentDate.toLocaleString(
'default',
{
month:'long',
year:'numeric'
}
);

let firstDay =
new Date(year,month,1).getDay();

let days =
new Date(year,month+1,0).getDate();

let html="";

for(let i=0;i<firstDay;i++){

html += "<div></div>";

}

for(let d=1; d<=days; d++){

let date =
`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

let found =
allData.some(
x=>fixDate(x.date)===date
);

html += `
<div
class="day"
onclick="showDay('${date}')"
style="
background:${found ? '#22c55e' : '#ef4444'};
">
${d}
</div>
`;

}

document.getElementById("calendar").innerHTML =
html;

};

window.showDay = function(date){

let list =
allData.filter(
x=>fixDate(x.date)===date
);

document.getElementById("modal").style.display =
"flex";

document.getElementById("formSection").style.display =
"none";

document.getElementById("viewSection").style.display =
"block";

if(list.length===0){

document.getElementById("viewSection").innerHTML =
`
<h3>No Reports</h3>

<br>

<button
class="submit"
onclick="openModal()">
➕ Add Entry
</button>

<button
class="close"
onclick="closeModal()">
Close
</button>
`;

return;

}

let html = `<h2>${date}</h2><br>`;

list.forEach(x=>{

html += `

<div class="report-card">

<button
class="delete-btn"
onclick="deleteEntry('${x.id}')">
🗑
</button>

<h3>👤 ${x.name}</h3>

<p>📌 Type: ${x.type}</p>
`;

if(x.type==="GPS"){

html += `

<p>🛰 RG No: ${x.rgno || ""}</p>

<p>🏢 Asset Code: ${x.assetcode || ""}</p>

<p>📱 IMEI: ${x.imei || ""}</p>

<p>🔢 Sensor No: ${x.sensorNo || ""}</p>
`;

if(x.photo){

html += `

<img
src="${x.photo}"
class="media">

<br><br>

<a
href="${x.photo}"
download
target="_blank">

<button class="submit">
⬇ Download Photo
</button>

</a>
`;

}

}

if(x.type==="Sensor"){

html += `

<p>⚙ Installation:
${x.installationType || ""}</p>

<p>🧵 Used Wire:
${x.usedWire || ""}</p>

<p>🔢 Sensor No:
${x.sensorNo || ""}</p>
`;

if(x.video){

html += `

<video
src="${x.video}"
controls
class="media">
</video>

<br><br>

<a
href="${x.video}"
download
target="_blank">

<button class="submit">
⬇ Download Video
</button>

</a>
`;

}

if(x.photo){

html += `

<img
src="${x.photo}"
class="media">

<br><br>

<a
href="${x.photo}"
download
target="_blank">

<button class="submit">
⬇ Download Photo
</button>

</a>
`;

}

}

html += `</div>`;

});

html += `

<div style="
display:flex;
gap:10px;
margin-top:15px;
">

<button
class="submit"
onclick="openModal()">

➕ Add More

</button>

<button
class="close"
onclick="closeModal()">

Close

</button>

</div>
`;

document.getElementById("viewSection").innerHTML =
html;

};

window.deleteEntry = async function(id){

if(!confirm("Delete Entry?"))
return;

await deleteDoc(
doc(db,"reports",id)
);

alert("✅ Deleted");

closeModal();

loadData();

};

window.downloadReports = function(){

let rows = [[
"Date",
"Name",
"Type",
"RG No",
"Asset Code",
"IMEI",
"Sensor No",
"Installation Type",
"Used Wire"
]];

allData.forEach(x=>{

rows.push([

x.date || "",
x.name || "",
x.type || "",
x.rgno || "",
x.assetcode || "",
x.imei || "",
x.sensorNo || "",
x.installationType || "",
x.usedWire || ""

]);

});

let csv =
rows.map(e=>e.join(",")).join("\n");

let blob =
new Blob([csv],{
type:"text/csv"
});

let a =
document.createElement("a");

a.href =
URL.createObjectURL(blob);

a.download =
"reports.csv";

a.click();

};

window.prevMonth = function(){

currentDate.setMonth(
currentDate.getMonth()-1
);

renderCalendar();

};

window.nextMonth = function(){

currentDate.setMonth(
currentDate.getMonth()+1
);

renderCalendar();

};

loadData();

</script>

</body>
</html>
