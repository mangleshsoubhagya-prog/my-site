function listenAttendance() {
  db.collection("attendance").onSnapshot(snapshot => {

// ---------------- MONTH RANGE ----------------
 function getSalaryMonthRange() {

    let today = new Date();

    // Offset month apply
    today.setMonth(today.getMonth() + monthOffset);

    let start, end;

    if (today.getDate() >= 26) {

        start = new Date(
            today.getFullYear(),
            today.getMonth(),
            26
        );

        end = new Date(
            today.getFullYear(),
            today.getMonth() + 1,
            25
        );

    } else {

        start = new Date(
            today.getFullYear(),
            today.getMonth() - 1,
            26
        );

        end = new Date(
            today.getFullYear(),
            today.getMonth(),
            25
        );

    }

    return { start, end };
}

function formatDate(date) {
  return date.getFullYear() + "-" +
    String(date.getMonth() + 1).padStart(2, "0") + "-" +
    String(date.getDate()).padStart(2, "0");
}
function getAttendanceCount(name){

    let { start, end } = getSalaryMonthRange();

    let startDate = formatDate(start);
    let endDate = formatDate(end);

    let userData = allAttendanceData.filter(x =>
        x.name === name &&
        x.date >= startDate &&
        x.date <= endDate
    );

    let uniqueDates = [];

    userData.forEach(x=>{
        if(!uniqueDates.includes(x.date)){
            uniqueDates.push(x.date);
        }
    });

    uniqueDates.sort();

    let attendance = uniqueDates.length;

    let joiningDate =
    uniqueDates.length
    ? new Date(uniqueDates[0] + "T00:00:00")
    : new Date();

    let current = new Date(end);
current.setHours(0,0,0,0);

    let tempDate = new Date(joiningDate);

    while(tempDate <= current){

        if(tempDate.getDay() === 0){

            let sunday = formatDate(tempDate);

            let saturdayDate = new Date(tempDate);
            saturdayDate.setDate(
                saturdayDate.getDate()-1
            );

            let mondayDate = new Date(tempDate);
            mondayDate.setDate(
                mondayDate.getDate()+1
            );

            let saturday =
            formatDate(saturdayDate);

            let monday =
            formatDate(mondayDate);

            let satMarked =
            uniqueDates.includes(saturday);

            let sunMarked =
            uniqueDates.includes(sunday);

            let monMarked =
            uniqueDates.includes(monday);

            if(!sunMarked && satMarked && monMarked){
                attendance++;
            }

            if(sunMarked){
                attendance++;
            }

        }

        tempDate.setDate(
            tempDate.getDate()+1
        );
    }

    return attendance;
}

// ---------------- PROFILE PHOTO (FIXED) ----------------
function initProfilePhoto() {

  const img = document.getElementById("profilePhoto");

  let saved = localStorage.getItem("profilePhoto");
  if (saved) img.src = saved;

  img.onclick = () => {
    document.getElementById("photoInput").click();
  };

  document.getElementById("photoInput").onchange = function () {
    let file = this.files[0];
    if (!file) return;

    let reader = new FileReader();

    reader.onload = function (e) {
      img.src = e.target.result;
      localStorage.setItem("profilePhoto", e.target.result);
    };

    reader.readAsDataURL(file);
  };
}

// ---------------- IMPORT FIXED ----------------
function handleImport() {

  const fileInput = document.getElementById("importFile");
  const file = fileInput.files[0];

  if (!file) {
    alert("Please select a file");
    return;
  }

  const fileName = file.name.toLowerCase();

  // ✅ allowed only csv + excel
  const allowedExtensions = ["csv", "xlsx", "xls"];
  const fileExtension = fileName.split(".").pop();

  if (!allowedExtensions.includes(fileExtension)) {
    alert("❌ Only CSV and Excel files are allowed!");
    fileInput.value = "";
    return;
  }

  const reader = new FileReader();

  reader.onload = function (e) {

    let data = [];

    try {

      // ---------------- CSV ----------------
      if (fileExtension === "csv") {

        const text = e.target.result;

        const rows = text
          .split("\n")
          .map(r => r.trim())
          .filter(r => r.length > 0)
          .map(r => r.split(","));

        const headers = rows[0];

        data = rows.slice(1).map(row => {
          let obj = {};
          headers.forEach((h, i) => {
            obj[h.trim()] = (row[i] || "").trim();
          });
          return obj;
        });
      }

      // ---------------- EXCEL ----------------
      else {

        const workbook = XLSX.read(
          new Uint8Array(e.target.result),
          { type: "array" }
        );

        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];

        data = XLSX.utils.sheet_to_json(sheet);
      }

      console.log("Imported Data:", data);

      if (!data || data.length === 0) {
        alert("❌ File is empty or invalid");
        return;
      }

      // update dashboard
      updateCounts(data);

      alert("✅ Import Successful! Total Records: " + data.length);

    } catch (error) {
      console.error(error);
      alert("❌ Import failed. Invalid file format.");
    }
  };

  // ---------------- READ FILE ----------------
  if (fileExtension === "csv") {
    reader.readAsText(file);
  } else {
    reader.readAsArrayBuffer(file);
  }
}
